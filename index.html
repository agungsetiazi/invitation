<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Spesial</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Reset margin dasar */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Latar belakang dan layout utama */
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); /* Latar gradasi abu-abu sangat muda */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #4a4a4a;
        }

        /* Desain Kartu */
        .card { 
            background: white; 
            padding: 40px 30px; 
            width: 90%; 
            max-width: 450px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); /* Bayangan lebih halus */
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeIn 1s ease-out; /* Efek muncul */
        }

        /* Garis pita aksen di atas kartu */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: #d4a373;
        }

        /* Tipografi */
        h1 { 
            font-family: 'Playfair Display', serif;
            color: #d4a373; 
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 25px;
        }

        .date {
            font-size: 1.2rem;
            font-weight: 500;
            color: #333;
            margin: 15px 0;
            padding: 10px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .location {
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Desain Tombol */
        .btn { 
            display: inline-block;
            background: #d4a373; 
            color: white; 
            padding: 12px 25px; 
            text-decoration: none; 
            border-radius: 25px; /* Tombol berbentuk pil */
            font-weight: 500;
            transition: all 0.3s ease; /* Animasi saat di-hover */
            box-shadow: 0 4px 15px rgba(212, 163, 115, 0.4);
        }

        .btn:hover {
            background: #c39362;
            transform: translateY(-3px); /* Tombol naik sedikit */
            box-shadow: 0 6px 20px rgba(212, 163, 115, 0.6);
        }

        /* Animasi keyframes untuk efek fade-in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Save the Date</h1>
        <p class="subtitle">Kami sangat menantikan kehadiran Anda</p>
        
        <p>Acara spesial ini akan diselenggarakan pada:</p>
        
        <div class="date">Sabtu, 12 Desember 2026</div>
        
        <div class="location">
            <p><strong>Gedung Serbaguna</strong></p>
            <p>Jakarta Pusat</p>
        </div>
        
        <a href="https://maps.google.com" target="_blank" class="btn">Buka Google Maps</a>
    </div>
</body>
</html>
